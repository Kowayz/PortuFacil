<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#2a5298"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#e8891a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle glow top-left -->
  <circle cx="100" cy="100" r="180" fill="white" fill-opacity="0.04"/>

  <!-- Green stripe at bottom (Brazil flag nod) -->
  <rect x="0" y="410" width="512" height="102" rx="0" fill="#1b5e20" fill-opacity="0.5"/>
  <rect x="0" y="460" width="512" height="52" rx="110" fill="none"/>
  <!-- bottom left corner fix -->
  <rect x="0" y="460" width="110" height="52" fill="#1b5e20" fill-opacity="0.5"/>
  <rect x="402" y="460" width="110" height="52" fill="#1b5e20" fill-opacity="0.5"/>
  <rect x="0" y="410" width="512" height="55" rx="0" fill="#1b5e20" fill-opacity="0.4"/>

  <!-- P in white -->
  <text x="52" y="340"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="290"
    font-weight="900"
    fill="white">P</text>

  <!-- F in gold -->
  <text x="248" y="340"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="290"
    font-weight="900"
    fill="url(#gold)">F</text>

  <!-- Small flag dots bottom-right -->
  <circle cx="390" cy="455" r="12" fill="#f5c842" fill-opacity="0.9"/>
  <circle cx="425" cy="455" r="12" fill="white" fill-opacity="0.5"/>
  <circle cx="460" cy="455" r="12" fill="#f5c842" fill-opacity="0.5"/>
</svg>
